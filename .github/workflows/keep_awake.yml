name: Keep Streamlit Awake

on:
  schedule:
    # Runs every 1 hour
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -s https://aip-g-1-two-stage-screening.streamlit.app/ > /dev/null
